# Render deployment configuration for CareerIQ Backend
services:
  - type: web
    name: careeriq-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://career-iq-muxu-ten.vercel.app"]'
      - key: APP_NAME
        value: CareerIQ
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: "false"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: UPLOAD_DIR
        value: uploads
